<html>
    <head>
        <title>
            login page
        </title>
    </head>
    <body>
        <form action="/loginpage">
            <div>
                <label > email  id :</label>
                <input type="email" required placeholder="eg : hari@gmail.com">
            </div>
            <div>
                <label > password :</label>
                <input type="password" required pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}$"
                title="one uppercase , one lowercase ,onesymbol , 8 char">
            </div>
            <div>
                <input type="submit" value="registration">
                <input type="reset" value="cancel">
            </div>
        </form>
    </body>
</html>
