<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challan Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 550px;
            width: 100%;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        
        .page-subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .divider {
            height: 2px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            margin-bottom: 30px;
        }
        
        .radio-group {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .radio-option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #17a2b8;
        }
        
        .radio-option label {
            cursor: pointer;
            margin: 0;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-section {
            margin-bottom: 25px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #17a2b8;
            box-shadow: 0 0 0 3px rgba(23, 162, 184, 0.1);
        }
        
        .captcha-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        
        .captcha-code {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .captcha-text {
            background: #000;
            color: #fff;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            min-width: 150px;
            text-align: center;
        }
        
        .refresh-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: #17a2b8;
            transition: transform 0.3s ease;
            padding: 0;
        }
        
        .refresh-btn:hover {
            transform: rotate(180deg);
        }
        
        .captcha-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .captcha-input:focus {
            outline: none;
            border-color: #17a2b8;
            box-shadow: 0 0 0 3px rgba(23, 162, 184, 0.1);
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(23, 162, 184, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        @media (max-width: 576px) {
            .container-card {
                padding: 25px;
            }
            
            .page-title {
                font-size: 24px;
            }
            
            .radio-group {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container-card">
        <h1 class="page-title">Challan Details</h1>
        <p class="page-subtitle">After getting challan details you can further go for online payment</p>
        <div class="divider"></div>
        
        <form id="challanForm" action="/challandetails" method="POST">
            <!-- Radio Button Options -->
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" id="challan" name="searchType" value="challan" checked>
                    <label for="challan">Challan Number</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="vehicle" name="searchType" value="vehicle">
                    <label for="vehicle">Vehicle Number</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="dlnumber" name="searchType" value="dl">
                    <label for="dlnumber">DL Number</label>
                </div>
            </div>
            
            <!-- Input Field -->
            <div class="form-section">
                <label for="inputField" class="form-label">Challan Number</label>
                <input 
                    type="text" 
                    id="inputField" 
                    class="form-input" 
                    placeholder="Enter Challan Number"
                    required
                >
            </div>
            
            <!-- CAPTCHA Section -->
            <div class="captcha-section">
                <div class="captcha-code">
                    <div class="captcha-text" id="captchaCode">Hm208a</div>
                    <button type="button" class="refresh-btn" id="refreshBtn" title="Refresh CAPTCHA">
                        🔄
                    </button>
                </div>
                <input 
                    type="text" 
                    class="captcha-input" 
                    id="captchaInput" 
                    placeholder="Enter Captcha"
                    required
                >
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="submit-btn">GET DETAIL</button>
        </form>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Generate random CAPTCHA code
        function generateCaptcha() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let captcha = '';
            for (let i = 0; i < 6; i++) {
                captcha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('captchaCode').textContent = captcha;
            document.getElementById('captchaInput').value = '';
        }
        
        // Refresh button event
        document.getElementById('refreshBtn').addEventListener('click', function(e) {
            e.preventDefault();
            generateCaptcha();
        });
        
        // Form submission
        document.getElementById('challanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const searchType = document.querySelector('input[name="searchType"]:checked').value;
            const inputValue = document.getElementById('inputField').value;
            const captchaValue = document.getElementById('captchaInput').value;
            const captchaCode = document.getElementById('captchaCode').textContent;
            
            if (captchaValue.toLowerCase() !== captchaCode.toLowerCase()) {
                alert('Invalid CAPTCHA. Please try again.');
                generateCaptcha();
                return;
            }
            
            console.log('Form submitted:', { searchType, inputValue, captchaValue });
            alert('Form submitted successfully!');
        });
    </script>
</body>
</html>
